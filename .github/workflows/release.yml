name: Release

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

env:
  AXO_RELEASES: true

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      has-releases: ${{ steps.plan.outputs.has-releases }}
      pr-run-mode: ${{ steps.plan.outputs.pr-run-mode }}
      tag: ${{ steps.plan.outputs.tag }}
      val: ${{ steps.plan.outputs.val }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cargo-dist
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh

      - id: plan
        run: |
          dist plan ${{ !contains(github.event.head_commit.message, 'skip-local-artifacts') && format('--tag={0}', github.ref_name) || '' }} --output-format=json > plan-dist-manifest.json
          echo "plan completed"
          cat plan-dist-manifest.json
          echo "has-releases=$(jq '.releases != null and (.releases | length) > 0' plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
          echo "pr-run-mode=skip" >> "$GITHUB_OUTPUT"
          echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  build-local-artifacts:
    name: build-local-artifacts (${{ matrix.system.target }})
    needs: plan
    if: ${{ needs.plan.outputs.has-releases == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        system:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: x86_64-pc-windows-msvc
            os: windows-2022
    runs-on: ${{ matrix.system.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cargo-dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh

      - name: Build artifacts
        run: dist build --tag=${{ needs.plan.outputs.tag }} --target=${{ matrix.system.target }} --output-format=json > dist-manifest.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-build-local-${{ matrix.system.target }}
          path: |
            dist-manifest.json
            target/distrib/

  build-global-artifacts:
    needs:
      - plan
      - build-local-artifacts
    if: ${{ needs.plan.outputs.has-releases == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cargo-dist
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh

      - name: Download local artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-build-local-*
          path: target/distrib/
          merge-multiple: true

      - name: Build global artifacts
        run: dist build --tag=${{ needs.plan.outputs.tag }} --output-format=json --artifacts=global > dist-manifest.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-build-global
          path: |
            dist-manifest.json
            target/distrib/

  host:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
    if: ${{ needs.plan.outputs.has-releases == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cargo-dist
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true

      - name: Host release
        run: dist host --steps=upload --steps=release --tag=${{ needs.plan.outputs.tag }} --output-format=json > dist-manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload final manifest
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-dist-manifest
          path: dist-manifest.json

  announce:
    needs:
      - plan
      - host
    if: ${{ needs.plan.outputs.has-releases == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cargo-dist
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh

      - name: Download final manifest
        uses: actions/download-artifact@v4
        with:
          name: artifacts-dist-manifest

      - name: Announce release
        run: dist host --steps=announce --tag=${{ needs.plan.outputs.tag }} --output-format=json > /dev/null
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
